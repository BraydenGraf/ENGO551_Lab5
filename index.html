<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoWeb MQTT Tracker</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Paho MQTT Client (Strict Requirement) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #333; color: white; padding: 1rem; }
        #controls { padding: 1rem; background: #f4f4f4; border-bottom: 1px solid #ccc; }
        .input-group { margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        label { font-weight: bold; margin-right: 5px; }
        input[type="text"], input[type="number"] { padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        #btn-start { background-color: #28a745; }
        #btn-end { background-color: #dc3545; }
        #btn-share { background-color: #007bff; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        #map { flex-grow: 1; min-height: 400px; width: 100%; }
        #status { padding: 5px 1rem; font-size: 0.9rem; background: #e9ecef; border-top: 1px solid #ccc; height: 100px; overflow-y: auto; }
        .log-msg { margin: 2px 0; font-family: monospace; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>

<header>
    <h2>MQTT Geo-Tracker</h2>
</header>

<div id="controls">
    <div class="input-group">
        <label>Host:</label> <input type="text" id="host" value="test.mosquitto.org">
        <label>Port:</label> <input type="number" id="port" value="8081">
        <label>SSL:</label> <input type="checkbox" id="ssl" checked>
    </div>
    <div class="input-group">
        <label>Topic:</label> 
        <input type="text" id="topic" value="ENGO551/BGraf/my_temperature" style="width: 250px;">
    </div>
    <div class="input-group">
        <button id="btn-start" onclick="startConnection()">Start</button>
        <button id="btn-end" onclick="endConnection()" disabled>End</button>
        <button id="btn-share" onclick="shareStatus()" disabled>Share My Status</button>
    </div>
</div>

<div id="map"></div>
<div id="status" id="console"></div>

<script>
    // Global Variables
    let client = null;
    let map = null;
    let myMarker = null;
    let isConnected = false;
    let shouldReconnect = false; // Controls manual vs auto-reconnect
    const consoleDiv = document.getElementById('status');

    // 1. Initialize Map
    function initMap() {
        // Default center (0,0) until location found
        map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
    }

    // 2. Logger Helper
    function log(msg, type = 'normal') {
        const div = document.createElement('div');
        div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        div.className = 'log-msg ' + type;
        consoleDiv.prepend(div);
    }

    // 3. Connection Logic
    function startConnection() {
        const host = document.getElementById('host').value;
        const port = parseInt(document.getElementById('port').value);
        const useSSL = document.getElementById('ssl').checked;
        const clientId = "client_" + Math.random().toString(16).substr(2, 8);

        shouldReconnect = true; // Enable auto-reconnect intent
        toggleInputs(true);

        log(`Connecting to ${host}:${port}...`);

        // Paho Setup
        client = new Paho.MQTT.Client(host, port, clientId);
        client.onConnectionLost = onConnectionLost;
        client.onMessageArrived = onMessageArrived;

        const connectOptions = {
            onSuccess: onConnect,
            onFailure: onFailure,
            useSSL: useSSL,
            keepAliveInterval: 30
        };

        client.connect(connectOptions);
    }

    function endConnection() {
        shouldReconnect = false; // Disable auto-reconnect
        if (client) {
            try {
                client.disconnect();
            } catch (e) { console.log(e); }
        }
        log("Disconnected by user.", "error");
        toggleInputs(false);
        isConnected = false;
    }

    function onConnect() {
        isConnected = true;
        const topic = document.getElementById('topic').value;
        log("Connected! Subscribing to: " + topic, "success");
        
        // Subscribe to the user's topic
        client.subscribe(topic);
        
        // Enable UI
        document.getElementById('btn-start').disabled = true;
        document.getElementById('btn-end').disabled = false;
        document.getElementById('btn-share').disabled = false;
    }

    function onFailure(responseObject) {
        log("Connection Failed: " + responseObject.errorMessage, "error");
        if (shouldReconnect) {
            handleReconnect();
        } else {
            toggleInputs(false);
        }
    }

    function onConnectionLost(responseObject) {
        if (responseObject.errorCode !== 0) {
            log("Connection Lost: " + responseObject.errorMessage, "error");
            if (shouldReconnect) {
                handleReconnect();
            }
        }
    }

    // Auto-reconnect logic
    function handleReconnect() {
        log("Attempting to reconnect in 3 seconds...", "normal");
        setTimeout(() => {
            if (shouldReconnect) {
                startConnection();
            }
        }, 3000);
    }

    // 4. Publishing Logic (Geolocation + GeoJSON)
    function shareStatus() {
        if (!navigator.geolocation) {
            log("Geolocation is not supported by your browser", "error");
            return;
        }

        log("Locating...");
        navigator.geolocation.getCurrentPosition((position) => {
            // Correct Location
            // const lat = position.coords.latitude;
            // const lon = position.coords.longitude;

            // Spoofing for recording
            const lat = position.coords.latitude + Math.floor(Math.random() * (0.1));
            const lon = position.coords.longitude - Math.floor(Math.random() * (0.1));

            // Generate Random Temp between -40 and 60
            // Math.random() * (max - min) + min
            const temp = Math.floor(Math.random() * (100)) - 40; 

            // Create GeoJSON
            const geoJson = {
                "type": "Feature",
                "geometry": {
                    "type": "Point",
                    "coordinates": [lon, lat]
                },
                "properties": {
                    "temperature": temp
                }
            };

            const payload = JSON.stringify(geoJson);
            const topic = document.getElementById('topic').value;
            
            message = new Paho.MQTT.Message(payload);
            message.destinationName = topic;
            client.send(message);
            
            log(`Published to ${topic}: Temp ${temp}°C`, "success");

        }, (error) => {
            log("Geolocation Error: " + error.message, "error");
        });
    }

    // 5. Message Handling & Visualization
    function onMessageArrived(message) {
        try {
            const data = JSON.parse(message.payloadString);
            
            // Validate GeoJSON structure
            if (data.type === "Feature" && data.geometry && data.properties) {
                const [lon, lat] = data.geometry.coordinates; // GeoJSON is Lon, Lat
                const temp = data.properties.temperature;
                
                updateMapMarker(lat, lon, temp);
            }
        } catch (e) {
            log("Received non-JSON message: " + message.payloadString);
        }
    }

    function updateMapMarker(lat, lon, temp) {
        // Determine Color
        let color = "gray";
        if (temp >= -40 && temp < 10) {
            color = "blue";
        } else if (temp >= 10 && temp < 30) {
            color = "green";
        } else if (temp >= 30 && temp <= 60) {
            color = "red";
        }

        // Circle Marker Options
        const markerOptions = {
            color: color,
            fillColor: color,
            fillOpacity: 0.8,
            radius: 12 // slightly larger to see easier
        };

        // If marker exists, move it; else create it
        if (myMarker) {
            myMarker.setLatLng([lat, lon]);
            myMarker.setStyle(markerOptions);
        } else {
            myMarker = L.circleMarker([lat, lon], markerOptions).addTo(map);
            map.setView([lat, lon], 13); // Zoom to user on first update
        }

        // Bind Popup with Temperature
        myMarker.bindPopup(`<b>Temperature:</b> ${temp}°C`).openPopup();
    }

    // UI Helper
    function toggleInputs(disabled) {
        document.getElementById('host').disabled = disabled;
        document.getElementById('port').disabled = disabled;
        document.getElementById('topic').disabled = disabled;
        document.getElementById('ssl').disabled = disabled;
        
        if (!disabled) {
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-end').disabled = true;
            document.getElementById('btn-share').disabled = true;
        }
    }

    // Start Map on Load
    initMap();

</script>

</body>
</html>
